<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- Tailwind css -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <link rel="stylesheet" href="./login.css">

     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100" >

    <section class="w-100 sm:w-150 mx-auto  my-16 bg-white p-5 rounded-lg shadow-md ">
        <header class="header  ">
           <img class="pt-2 w-30 mx-auto " src="./assets/github-logo.png" alt="">
           <h2 class="text-3xl font-bold text-center mt-5">GitHub Issues Tracker</h2>
           <p class="text-2xl mb-6">Sign in to manage your issues</p> 
        </header>


     <section class=" shadow-md p-4  sm:p-5   mx-0 sm:mx-10">
        <div class="text-2xl ">
            <h4 class="mb-3 " >Username</h4>
            <input id="username" class="border w-full p-2 mb-3 rounded" type="text" placeholder="Enter Username">
        </div>
        <div class="text-2xl">
            <h4 class="mb-3 " >Password</h4>
            <input id="password" class="border w-full p-2 mb-3 rounded" type="password" placeholder="Enter Password">
        </div>
        <br>
        <button type="button" onclick="login()" class="bg-blue-500 text-white text-3xl w-full h-16 py-2 rounded">Sign In</button>

       <hr class="mt-5"><p class=" flex justify-center text-2xl">OR</p>
     </section>
     

        <div>
            <h5 class=" text-2xl m-5 flex justify-center items-center">Demo Credentials:</h5>
        <div class="bg-gray-100 w-1/2 m-auto p-6 rounded-2xl">
            <h4 class="my-auto flex justify-center items-center">Username:<samp>admin</samp> </h4>
            <h4 class="flex justify-center items-center">Password:<samp>admin123</samp> </h4>
        </div>
        </div>

    </section>

    <script>
        function login(){
            const username = document.getElementById('username').value
            const password = document.getElementById('password').value


            if(username === "admin" && password === "admin123"){
                window.location.replace("dashboard.html")
            }
            else{ 
                alert("Enter username or password")
            }
        }
    </script>
</body>
</html>
