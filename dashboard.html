<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <!-- daisyui --><!-- Tailwind css -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- css -->
     <link rel="stylesheet" href="./login.css">
    <!-- font  -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


<style>
    .active{
        background-color:green ;
        color: white;
    }
    /* .hidden{
        display: none;
    } */
   
</style>
</head>
<body>
   <header class="flex-none sm:flex justify-between items-center mb-10  bg-amber-100 shadow-md">
        <div class="flex m-3.5 gap-3">
             <img class="w-16" src="./assets/github-logo.png" alt="github-logo"> 
             <h2 class="font-bold text-3xl text-center p-3">GitHub Issues Tracker</h2>
        </div>
        <div class="flex gap-2 mr-2 text-2xl">
            <input  id="search-input" type="text" placeholder="Search issuse" class="input" />
            <button id="search-btn" class="btn btn-soft btn-accent "> + New Issue</button>
        </div>  
       
    </header>

    <section class="w-[90%] m-auto shadow-md  ">
        <section class=" bg-primary-content shadow-md p-5"  >
             <button onclick="loadAll()" id="loadAll" class="remove btn btn-soft btn-accent border">All</button>
             <button onclick="loadOpen()" id="loadOpen" class="remove btn btn-soft btn-accent border">Open</button>
             <button onclick="loadClosed()" id="loadClosed" class="remove btn btn-soft btn-accent border">Closed</button>
        </section>
        <section class="flex justify-between items-center p-5 bg-primary-content/40">
             
             <div class="flex items-center">
                  <img class="w-16 h-16 mr-2"  src="./assets/Aperture.png" alt="">
                  <div class="">
                     <h2 class="text-3xl "><samp class="text-4xl text-yellow-500" id="box-counter"></samp>Issues</h2>
                     <p class="text-2xl">Track and manage your project issues</p>
                 </div>
             </div>
             <div class="flex gap-2 mr-5">
                 <div class="bg-green-500 rounded-full border  border-t-purple-400 h-5 w-5" > </div>
                 <p>Open</p>
                 <div class="bg-purple-500 rounded-full border h-5 w-5"></div>
                 <p>Closed</p>
             </div>
          </section>

         

          <!-- loadin  -->
                <section id="losding" class="flex justify-center items-center hidden">
                    <span class="loading loading-spinner text-accent w-50 h-50 "></span>
                </section>

               

          <div  id="issues-container" class="bg-primary-content/20  gap-3 p-5 grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 ">

             
            </div>
    </section>  
    
    
<!-- // <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->

    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <div class="  space-y-3" id="detail-container"></div>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn btn text-white bg-blue-700 ">Close</button>
          </form>
        </div>
      </div>
    </dialog>
